<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Fiction — Iniciar sesión</title>

  <!-- CSS compartido -->
  <link rel="stylesheet" href="../../shared/css/variables.css" />
  <link rel="stylesheet" href="../../shared/css/reset.css" />
  <link rel="stylesheet" href="../../shared/css/main.css" />
  <link rel="stylesheet" href="../../shared/css/navbar.css" />
  <link rel="stylesheet" href="../../shared/css/modal.css" />
  <!-- CSS de página -->
  <link rel="stylesheet" href="./login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <main class="auth-page">
    <div class="auth-split">

      <!-- Imagen a la izquierda -->
      <div class="auth-split__image">
        <div class="collage">
          <div class="collage__item collage__item--1">
            <img src="../../assets/images/login/taxi driver.webp" alt="" fetchpriority="high" />
          </div>
          <div class="collage__item collage__item--2">
            <img src="../../assets/images/login/alien.webp" alt="" />
          </div>
          <div class="collage__item collage__item--3">
            <img src="../../assets/images/login/el resplandor.webp" alt="" />
          </div>
          <div class="collage__item collage__item--4">
            <img src="../../assets/images/login/gran hotel budapest.webp" alt="" />
          </div>
          <div class="collage__item collage__item--5">
            <img src="../../assets/images/login/antes del amanecer.webp" alt="" />
          </div>
          <div class="collage__item collage__item--6">
            <img src="../../assets/images/login/trainspotting.webp" alt="" />
          </div>
          <div class="collage__item collage__item--7">
            <img src="../../assets/images/login/apocalipsis now.webp" alt="" />
          </div>
        </div>
      </div>

      <!-- Formulario a la derecha -->
      <div class="auth-split__form">
        <div class="auth-card">

          <div class="auth-card__header">
            <a href="../home/home.html" class="auth-logo">Daily Fiction</a>
            <p class="auth-subtitle text-muted">Inicia sesión para participar en el ranking</p>
          </div>

          <!-- Google -->
          <div class="google-btn-wrap">
            <div id="google-signin-btn"></div>
          </div>

          <div class="auth-divider"><span>o con tu correo</span></div>

          <!-- Formulario -->
          <form id="login-form" novalidate>

            <div class="form-group">
              <label class="form-label" for="login-identifier">Correo o nombre de usuario</label>
              <input
                id="login-identifier"
                name="identifier"
                class="form-input"
                type="text"
                placeholder="tu@correo.com o cinefilo99"
                autocomplete="username"
                required
              />
              <div class="form-error" data-field="identifier"></div>
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">Contraseña</label>
              <div class="input-password-wrap">
                <input
                  id="login-password"
                  name="password"
                  class="form-input"
                  type="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="input-password-toggle" aria-label="Mostrar contraseña">
                  <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <div class="form-error" data-field="password"></div>
            </div>

            <div id="login-error" class="form-general-error"></div>

            <button type="submit" class="btn btn-primary btn-block mt-4">Iniciar sesión</button>
          </form>

          <p class="auth-footer">
            ¿No tienes cuenta?
            <a href="../register/register.html" class="link">Regístrate gratis</a>
          </p>

        </div>
      </div><!-- /.auth-split__form -->

    </div><!-- /.auth-split -->
  </main>

<!-- Modal de error de login -->
  <div id="validation-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="validation-modal-title">
    <div class="modal validation-modal-card">
      <div class="validation-modal__frame">
        <i class="vm-corner vm-corner--tl" aria-hidden="true"></i>
        <i class="vm-corner vm-corner--tr" aria-hidden="true"></i>
        <i class="vm-corner vm-corner--bl" aria-hidden="true"></i>
        <i class="vm-corner vm-corner--br" aria-hidden="true"></i>
        <h2 class="validation-modal__title" id="validation-modal-title">Campos<br>Incompletos</h2>
        <div class="validation-modal__divider">✦</div>
        <p class="validation-modal__body">Por favor, completa los siguientes<br>campos antes de continuar</p>
        <ul class="validation-modal__list" id="validation-modal-list"></ul>
        <button class="btn btn-primary btn-full validation-modal__btn" id="validation-modal-ok">Entendido</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts compartidos -->
  <script src="../../shared/js/config.js"></script>
  <script src="../../shared/js/utils.js"></script>
  <script src="../../shared/js/api.js"></script>
  <script src="../../shared/js/auth.js"></script>
  <script src="../../shared/js/main.js"></script>
  <!-- Script de página -->
  <script src="./login.js"></script>

</body>
</html>
