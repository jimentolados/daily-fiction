<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Fiction — Test del día</title>

  <!-- CSS compartido -->
  <link rel="stylesheet" href="../../shared/css/variables.css" />
  <link rel="stylesheet" href="../../shared/css/reset.css" />
  <link rel="stylesheet" href="../../shared/css/main.css" />
  <link rel="stylesheet" href="../../shared/css/navbar.css" />
  <link rel="stylesheet" href="../../shared/css/modal.css" />
  <!-- CSS de página -->
  <link rel="stylesheet" href="./quiz.css" />
</head>
<body class="quiz-page">

  <!-- Navbar -->
  <header id="navbar" class="navbar"></header>

  <div class="quiz-page-wrap">

    <!-- Cabecera del test -->
    <section class="quiz-header">
      <div class="quiz-header__date" id="today-date"></div>
    </section>

    <div class="container quiz-container">
      <div id="quiz-wrapper"></div>
    </div>

  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts compartidos -->
  <script src="../../shared/js/config.js"></script>
  <script src="../../shared/js/utils.js"></script>
  <script src="../../shared/js/api.js"></script>
  <script src="../../shared/js/auth.js"></script>
  <script src="../../shared/js/main.js"></script>
  <!-- Script de página -->
  <script src="./quiz.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const dateEl = document.getElementById('today-date');
      if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString('es-ES', {
          weekday: 'long', day: 'numeric', month: 'long'
        });
      }
      initQuiz();
    });
  </script>

</body>
</html>
