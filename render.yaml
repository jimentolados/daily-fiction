services:
  - type: web
    name: daily-fiction-api
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: >-
      pip install -r backend/requirements.txt &&
      python backend/manage.py collectstatic --noinput
    startCommand: >-
      gunicorn config.wsgi:application
      --chdir backend
      --workers 2
      --timeout 120
    preDeployCommand: >-
      python backend/manage.py migrate --noinput &&
      python backend/manage.py ensure_superuser
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      # Rellena DATABASE_URL con tu connection string de Neon
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: daily-fiction-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://daily-fiction.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://daily-fiction-api.onrender.com,https://daily-fiction.vercel.app
      # APIs externas — rellena en el dashboard de Render
      - key: TMDB_API_KEY
        sync: false
      - key: OMDB_API_KEY
        sync: false
      # Superusuario inicial — rellena en el dashboard de Render
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
